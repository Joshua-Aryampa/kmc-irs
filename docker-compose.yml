services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: irs_user
      POSTGRES_PASSWORD: irs_dev_password
      POSTGRES_DB: irs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irs_user -d irs"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
