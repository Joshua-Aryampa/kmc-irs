{% extends "base.html" %}
{% block title %}Reassign — {{ incident.incident_id }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Reassign — {{ incident.incident_id }}</h1>
  <p class="page-subtitle">Change verifier or approver for this incident</p>
</div>
<form method="post" class="form-section admin-form form-stack">
  {% csrf_token %}
  {% for field in form %}
  <div>
    <label class="form-label">{{ field.label }}</label>
    {{ field }}
  </div>
  {% endfor %}
  <div>
    <button type="submit" class="btn-primary">Reassign</button>
  </div>
</form>
{% endblock %}
